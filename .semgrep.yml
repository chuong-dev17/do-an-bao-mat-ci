rules:
  - id: jsp-unescaped-scriptlet-output
    message: "Potential XSS: unescaped JSP scriptlet output (<%= ... %>)"
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.jsp"
    pattern-regex: "<%=\\s*[^%]+%>"

  - id: jsp-unescaped-param-el-output
    message: "Potential XSS: unescaped request parameter rendered into HTML"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.jsp"
    pattern-either:
      - pattern-regex: ">\\s*\\$\\{\\s*param\\.[^}]+\\}\\s*<"
      - pattern-regex: "<(input|option|textarea)[^>]*\\bvalue\\s*=\\s*\"\\$\\{\\s*param\\.[^}]+\\}\""

  - id: jsp-unescaped-user-el-output
    message: "Potential XSS: unescaped USER/session/request output rendered into HTML"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.jsp"
    pattern-either:
      - pattern-regex: ">\\s*\\$\\{\\s*(USER|sessionScope|requestScope)\\.[^}]+\\}\\s*<"
      - pattern-regex: "<(input|option|textarea)[^>]*\\bvalue\\s*=\\s*\"\\$\\{\\s*(USER|sessionScope|requestScope)\\.[^}]+\\}\""
