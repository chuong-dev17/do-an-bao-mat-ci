rules:
  - id: jsp-unescaped-scriptlet-output
    message: "Potential XSS: unescaped JSP scriptlet output (<%= ... %>)"
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.jsp"
    pattern-regex: "<%=\\s*[^%]+%>"

  - id: jsp-unescaped-param-el-output
    message: "Potential XSS: unescaped request parameter output (${param.*})"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.jsp"
    pattern-regex: "\\$\\{\\s*param\\.[^}]+\\}"

  - id: jsp-unescaped-user-el-output
    message: "Potential XSS: unescaped user/session/request EL output"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.jsp"
    pattern-regex: "\\$\\{\\s*(USER|sessionScope|requestScope)\\.[^}]+\\}"
