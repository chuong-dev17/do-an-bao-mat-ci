# Phân tích SonarQube Cloud. Thêm GitHub secret SONAR_TOKEN (và sửa sonar-project.properties).
name: SonarCloud

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud configuration
        shell: bash
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "::error::Missing SONAR_TOKEN secret. Add it in GitHub repository secrets to enable SonarCloud scan."
            exit 1
          fi

          if grep -v '^[[:space:]]*#' sonar-project.properties | grep -q "YOUR_SONARCLOUD_"; then
            echo "::error::sonar-project.properties still contains placeholder values. Replace them before running SonarCloud scan."
            exit 1
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
