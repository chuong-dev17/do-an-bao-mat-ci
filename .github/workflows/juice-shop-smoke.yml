# OWASP Juice Shop dạng service container: minh chứng pipeline có bước kiểm tra target chạy động (không cần VPS).
# Chạy local cho lab: docker run --rm -p 3000:3000 bkimminich/juice-shop
name: Juice Shop smoke (service container)

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  juice-shop-smoke:
    runs-on: ubuntu-latest
    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000
    steps:
      - name: Wait for Juice Shop
        # Trên GitHub Actions, service được gọi theo hostname trùng tên service (không dùng localhost).
        run: |
          for i in $(seq 1 60); do
            if curl -sf --max-time 5 http://juice-shop:3000/ >/dev/null; then
              echo "Juice Shop responded on juice-shop:3000"
              exit 0
            fi
            echo "attempt $i: waiting..."
            sleep 2
          done
          echo "timeout waiting for Juice Shop"
          exit 1

      - name: Smoke API (public search)
        run: |
          curl -sf --max-time 10 "http://juice-shop:3000/rest/products/search?q=" | head -c 500
          echo
